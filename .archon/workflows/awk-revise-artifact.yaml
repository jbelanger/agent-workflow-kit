name: awk-revise-artifact
description: |
  Record a durable revision request for a draft planning artifact from the dashboard. Supports draft
  vision briefs, draft specs, and proposed ADRs. It does not accept, implement, break down, merge, or
  create child work items.

provider: codex
model: gpt-5.5
modelReasoningEffort: high
webSearchMode: disabled
worktree:
  enabled: false

nodes:
  - id: record-artifact-revision
    bash: |
      set -euo pipefail
      node <<'NODE'
      const { existsSync, readFileSync, writeFileSync } = await import('node:fs');
      const { dirname, relative, resolve } = await import('node:path');

      const args = process.env.ARGUMENTS || process.env.USER_MESSAGE || '';
      const cwd = process.cwd();
      const revisionPath = "$ARTIFACTS_DIR/artifact-revision.md";
      const workflowId = "$WORKFLOW_ID";

      function emit(payload) {
        console.log(JSON.stringify({
          revision_path: revisionPath,
          ...payload,
        }));
      }

      function normalizePath(raw) {
        if (!raw) return '';
        const cleaned = raw.trim().replace(/[),.;:]+$/g, '');
        if (cleaned.startsWith('/')) {
          const abs = resolve(cleaned);
          const rel = relative(cwd, abs);
          if (!rel.startsWith('..') && rel !== '') return rel;
        }
        return cleaned;
      }

      function findArtifactMatch(text) {
        const patterns = [
          /(?:^|\s)(docs\/development\/discovery\/[^\s`'")]+\/vision-brief\.md[),.;:]*)/,
          /(?:^|\s)(docs\/development\/specs\/[^\s`'")]+\.md[),.;:]*)/,
          /(?:^|\s)(docs\/development\/adrs\/[^\s`'")]+\.md[),.;:]*)/,
          /(?:^|\s)(\/[^\s`'")]+\/docs\/development\/discovery\/[^\s`'")]+\/vision-brief\.md[),.;:]*)/,
          /(?:^|\s)(\/[^\s`'")]+\/docs\/development\/specs\/[^\s`'")]+\.md[),.;:]*)/,
          /(?:^|\s)(\/[^\s`'")]+\/docs\/development\/adrs\/[^\s`'")]+\.md[),.;:]*)/,
        ];
        for (const pattern of patterns) {
          const match = text.match(pattern);
          if (!match) continue;
          const rawPath = match[1];
          const rawStart = match.index + match[0].lastIndexOf(rawPath);
          return {
            path: normalizePath(rawPath),
            start: rawStart,
            end: rawStart + rawPath.length,
          };
        }
        return undefined;
      }

      function artifactConfig(path) {
        if (/^docs\/development\/discovery\/[^/]+\/vision-brief\.md$/.test(path)) {
          return {
            type: 'vision',
            stateLabel: 'Vision state',
            draftValue: 'Draft',
            decisionLogPath: `${dirname(path)}/decision-log.md`,
          };
        }
        if (/^docs\/development\/specs\/[^/]+\.md$/.test(path)) {
          return {
            type: 'spec',
            stateLabel: 'Spec state',
            draftValue: 'Draft',
            decisionLogPath: '',
          };
        }
        if (/^docs\/development\/adrs\/[^/]+\.md$/.test(path)) {
          return {
            type: 'adr',
            stateLabel: 'Status',
            draftValue: 'Proposed',
            decisionLogPath: '',
          };
        }
        return undefined;
      }

      function stateOf(text, label) {
        const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const match = text.match(new RegExp(`^${escaped}:\\s*(.+?)\\s*$`, 'm'));
        return match?.[1]?.trim() ?? '';
      }

      function appendHistory(path, entry) {
        const current = existsSync(path) ? readFileSync(path, 'utf8') : '';
        const marker = '## Human decision history';
        if (!current.includes(marker)) {
          writeFileSync(path, `${current.trimEnd()}\n\n${marker}\n\n${entry}\n`);
          return;
        }
        writeFileSync(path, `${current.trimEnd()}\n${entry}\n`);
      }

      function cleanReason(value) {
        return value
          .trim()
          .replace(/^(?:REVISE|REVISION|CHANGES|REJECT|REASON)\s*:\s*/i, '')
          .replace(/^(?:because|for|with|to|so that)\s+/i, '')
          .replace(/^[-:;,.]\s*/, '')
          .trim();
      }

      function revisionReason(text, artifactMatch) {
        const after = cleanReason(text.slice(artifactMatch.end));
        if (after) return after;

        const before = cleanReason(text.slice(0, artifactMatch.start));
        if (!before || /^(?:revise|revision|changes|reject|record|request|artifact)$/i.test(before)) {
          return '';
        }
        return before;
      }

      function writeRevision(payload) {
        writeFileSync(
          revisionPath,
          [
            '# Artifact Revision Request',
            '',
            `Status: ${payload.status_label}`,
            '',
            `Artifact path: ${payload.artifact_path ?? ''}`,
            `Artifact type: ${payload.artifact_type ?? ''}`,
            `State unchanged: ${payload.state_unchanged ?? ''}`,
            `Decision record: ${payload.decision_record_path ?? ''}`,
            `Revision reason: ${payload.revision_reason ?? ''}`,
            `Next action: ${payload.next_action ?? ''}`,
            '',
          ].join('\n')
        );
      }

      const artifactMatch = findArtifactMatch(args);
      if (!artifactMatch?.path) {
        const payload = {
          status: 'STOP',
          status_label: 'Stopped',
          reason: 'No supported artifact path was found.',
          artifact_path: '',
          artifact_type: '',
          state_unchanged: '',
          decision_record_path: '',
          revision_reason: '',
          next_action: 'Rerun with a vision brief, spec, or ADR path plus a revision reason.',
        };
        writeRevision(payload);
        emit(payload);
        process.exit(0);
      }

      const artifactPath = artifactMatch.path;
      const reason = revisionReason(args, artifactMatch);
      const config = artifactConfig(artifactPath);
      if (!config) {
        const payload = {
          status: 'STOP',
          status_label: 'Stopped',
          reason: 'Unsupported artifact path. This workflow supports vision briefs, specs, and ADRs.',
          artifact_path: artifactPath,
          artifact_type: '',
          state_unchanged: '',
          decision_record_path: '',
          revision_reason: reason,
          next_action: 'Route unsupported artifacts through manual review or a later workflow increment.',
        };
        writeRevision(payload);
        emit(payload);
        process.exit(0);
      }

      if (!reason) {
        const payload = {
          status: 'STOP',
          status_label: 'Stopped',
          reason: 'No revision reason was provided.',
          artifact_path: artifactPath,
          artifact_type: config.type,
          state_unchanged: '',
          decision_record_path: '',
          revision_reason: '',
          next_action: `Rerun with a reason, for example: ${artifactPath} REVISE: what must change.`,
        };
        writeRevision(payload);
        emit(payload);
        process.exit(0);
      }

      if (!existsSync(artifactPath)) {
        const payload = {
          status: 'STOP',
          status_label: 'Stopped',
          reason: `Artifact does not exist: ${artifactPath}`,
          artifact_path: artifactPath,
          artifact_type: config.type,
          state_unchanged: '',
          decision_record_path: '',
          revision_reason: reason,
          next_action: 'Rerun with an existing artifact path.',
        };
        writeRevision(payload);
        emit(payload);
        process.exit(0);
      }

      const text = readFileSync(artifactPath, 'utf8');
      const currentState = stateOf(text, config.stateLabel);
      if (currentState !== config.draftValue) {
        const payload = {
          status: 'STOP',
          status_label: 'Stopped',
          reason: `Artifact state is ${currentState || '(missing)'}, not ${config.draftValue}.`,
          artifact_path: artifactPath,
          artifact_type: config.type,
          state_unchanged: currentState ? `${config.stateLabel}: ${currentState}` : '',
          decision_record_path: '',
          revision_reason: reason,
          next_action: 'Clarify whether this artifact should be accepted, superseded, or revised in a new draft.',
        };
        writeRevision(payload);
        emit(payload);
        process.exit(0);
      }

      let decisionRecordPath = artifactPath;
      if (config.decisionLogPath && existsSync(config.decisionLogPath)) {
        decisionRecordPath = config.decisionLogPath;
      }

      const timestamp = new Date().toISOString();
      const entry = `- ${timestamp}: ${config.type} revision requested through Archon artifact revision workflow. Run: ${workflowId}. Reason: ${reason}`;
      appendHistory(decisionRecordPath, entry);

      const payload = {
        status: 'REVISION_REQUESTED',
        status_label: 'Revision requested',
        reason: 'Revision request recorded.',
        artifact_path: artifactPath,
        artifact_type: config.type,
        state_unchanged: `${config.stateLabel}: ${currentState}`,
        decision_record_path: decisionRecordPath,
        revision_reason: reason,
        next_action: 'Revise the artifact, then rerun awk-review-artifact.',
      };
      writeRevision(payload);
      emit(payload);
      NODE

  - id: stop-revision
    depends_on: [record-artifact-revision]
    when: "$record-artifact-revision.output.status == 'STOP'"
    cancel: "Artifact revision stopped: $record-artifact-revision.output.reason"
