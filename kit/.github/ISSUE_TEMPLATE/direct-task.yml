name: Direct Task
description: Fast-lane task for tiny, clear work that does not need separate discovery, spec, ADR, spike, breakdown, or re-brief.
title: "[Direct Task] "
labels: ["task", "next:work-issue-local"]
body:
  - type: markdown
    attributes:
      value: |
        **A small, obvious change that doesn't need its own spec, ADR, or discovery.** Just say what changes, where it's allowed to touch, and how to check it. Agents use labels, comments, and the rebuildable workflow cache for routing state.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: The small, concrete outcome.
      placeholder: |
        e.g. Fix the typo "recieve" -> "receive" in the onboarding email copy.
    validations:
      required: true
  - type: textarea
    id: direct_task_rationale
    attributes:
      label: DIRECT_TASK rationale
      description: Why this can skip the usual shaping — no discovery, spec, ADR, spike, breakdown, or human question needed.
      placeholder: |
        e.g. One-line copy fix with no behavior change — nothing to decide or design.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: In scope, out of scope, allowed files/directories, and forbidden files/directories.
      placeholder: |
        In: emails/onboarding.tsx
        Out: rewording any other emails
        Forbidden: everything outside emails/onboarding.tsx
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true when this tiny task is done?
      placeholder: |
        e.g. The word is spelled correctly; no other copy changed.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: The exact command to run — or, if nothing exercises this change, an honest note that it's check-only.
      placeholder: |
        e.g. `npm run lint` passes. (Or: check-only — no test touches this string.)
    validations:
      required: true
  - type: dropdown
    id: merge_risk
    attributes:
      label: Merge risk
      description: Direct tasks are usually Parallel-safe. Pick a higher risk only when coordination is real.
      options:
        - Parallel-safe
        - Needs coordination
        - Serial only
    validations:
      required: true
  - type: textarea
    id: pr_requirements
    attributes:
      label: PR requirements
      description: What the eventual PR must include — issue linkage, the facts the summary should state, validation evidence, and any parent-resolution note.
      placeholder: |
        e.g. Closes #58. Summary names the fixed string. Lint output pasted as evidence.
    validations:
      required: true
