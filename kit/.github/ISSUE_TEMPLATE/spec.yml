name: Spec
description: Define behavior, contracts, records, APIs, or user-visible semantics before implementation.
title: "[Spec] "
labels: ["spec", "next:draft-artifact"]
body:
  - type: markdown
    attributes:
      value: |
        **Decide how something should behave before it gets built.** Capture the problem and the behavior you're proposing; your agent drafts it and a human accepts it before any code. Agents use labels, comments, and the rebuildable workflow cache for routing state.
  - type: dropdown
    id: spec_state
    attributes:
      label: Spec state
      description: Where this spec is in its life. Start at Draft.
      options:
        - Draft
        - Accepted
        - Implemented
        - Superseded
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operational problem does this spec solve?
      placeholder: |
        e.g. When an import fails, users get a generic 500 with no detail, so they can't tell what to fix.
    validations:
      required: true
  - type: textarea
    id: source_context
    attributes:
      label: Source context
      description: What this builds on — link grooming, discovery, ADRs, incidents, product notes, code, or prior specs.
      placeholder: |
        e.g. Comes out of discovery #31 and the incident write-up in docs/development/spikes/import-failures.md.
    validations:
      required: true
  - type: textarea
    id: proposed_behavior
    attributes:
      label: Proposed behavior or contract
      description: What should become accepted truth after review? Be specific enough to build from.
      placeholder: |
        e.g. On import failure, return 422 with a body of { row, field, reason } entries — one per invalid cell. Define the error shape here.
    validations:
      required: true
  - type: textarea
    id: open_questions
    attributes:
      label: Open questions or decisions
      description: Anything still unresolved — behavior, product, architecture, ownership, validation, or UX. Use None only when it's honestly settled.
      placeholder: |
        e.g. Should a partial import commit the valid rows, or reject the whole file?
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What should this spec deliberately not settle?
      placeholder: |
        e.g. Not deciding the retry/queue behavior; not changing the upload UI.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance and breakdown notes
      description: What makes this spec accepted, and what implementation slices should follow once it is?
      placeholder: |
        e.g. Accepted once the error shape is approved. Then break into: (1) validation layer, (2) error response, (3) client display.
    validations:
      required: false
