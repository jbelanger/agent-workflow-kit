name: awk-continue-work
description: |
  Use when the operator says "continue work" and needs the next safe workflow step.
  The workflow reads Archon runtime state first, then portable planning state, and writes
  a routing artifact. It does not edit files or start another workflow.

provider: codex
model: gpt-5.5
modelReasoningEffort: high
webSearchMode: disabled
worktree:
  enabled: false

nodes:
  - id: runtime-state
    bash: |
      DB="$HOME/.archon/archon.db"

      echo "# Archon Runtime State"
      echo

      if [ ! -f "$DB" ]; then
        echo "Archon DB not found at $DB."
        exit 0
      fi

      echo "## Active non-router workflow runs"
      sqlite3 -header -column "$DB" "
        SELECT
          id,
          workflow_name,
          status,
          current_step_index,
          substr(user_message, 1, 120) AS user_message,
          last_activity_at,
          working_path
        FROM remote_agent_workflow_runs
        WHERE workflow_name != 'awk-continue-work'
          AND status IN ('pending', 'running', 'paused', 'failed')
        ORDER BY last_activity_at DESC;
      "

      echo
      echo "## Recent terminal workflow runs"
      sqlite3 -header -column "$DB" "
        SELECT
          id,
          workflow_name,
          status,
          substr(user_message, 1, 120) AS user_message,
          completed_at,
          working_path
        FROM remote_agent_workflow_runs
        WHERE workflow_name != 'awk-continue-work'
          AND status IN ('completed', 'cancelled', 'abandoned')
        ORDER BY completed_at DESC
        LIMIT 5;
      "

      echo
      echo "## Active isolation environments"
      sqlite3 -header -column "$DB" "
        SELECT
          workflow_type,
          workflow_id,
          status,
          branch_name,
          working_path,
          updated_at
        FROM remote_agent_isolation_environments
        WHERE status = 'active'
        ORDER BY updated_at DESC;
      "

      echo
      echo "## Git state"
      git branch --show-current
      git status --short

  - id: route
    command: awk-continue-work
    depends_on: [runtime-state]
    context: fresh
    output_type: continue-work-route
