name: Task
description: A prepared implementation or documentation task for one agent, one branch or worktree, and one PR.
title: "[Task] "
labels: ["task", "next:work-issue-local"]
body:
  - type: markdown
    attributes:
      value: |
        **Work that's ready to build — one agent, one branch or worktree, one PR.** Fill in the sections below so the task is safe to hand off without a back-and-forth. Agents use labels, comments, and the rebuildable workflow cache for routing state.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: The concrete outcome this one task must deliver.
      placeholder: |
        e.g. Add a --json flag to the `export` command so CI can read the output as structured data.
    validations:
      required: true
  - type: textarea
    id: readiness
    attributes:
      label: Readiness evidence
      description: What makes this ready to build? Link the accepted spec, ADR, discovery, spike, breakdown, or direct-task rationale. Note any human questions asked and answered, or why none were needed.
      placeholder: |
        e.g. Behavior accepted in spec #42. No open human questions — the spec covers the edge cases.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and boundaries
      description: Where this task is allowed to touch — and where it must not. Parent issue, non-goals, owned area, allowed files/directories, forbidden files/directories.
      placeholder: |
        Parent: #40
        Owned area: the export pipeline
        Allowed: src/export/**, tests/export/**
        Forbidden: src/auth/**, anything outside export
        Non-goals: changing the CSV format
    validations:
      required: true
  - type: textarea
    id: surfaces
    attributes:
      label: Architecture, contracts, and user surfaces
      description: Anything others depend on — public APIs, storage, migrations, screens, UX direction, accessibility/usability risks. If none are touched, say so plainly.
      placeholder: |
        e.g. Adds one public flag (--json); no storage or migrations. Output is machine-readable, so there's no screen or UX surface here.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: The observable conditions that mean this task is done.
      placeholder: |
        e.g.
        - `export --json` prints valid JSON
        - the existing text output is unchanged
        - a new test covers the JSON path
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Feedback loop and validation
      description: How an agent knows it's working — the feedback loop or test seam, the tests required, and the exact command to run.
      placeholder: |
        e.g. Focused: `npm test -- export`. Full check: `npm run check`.
    validations:
      required: true
  - type: dropdown
    id: merge_risk
    attributes:
      label: Merge risk
      description: How safely this can land alongside other in-flight work.
      options:
        - Parallel-safe
        - Needs coordination
        - Serial only
    validations:
      required: true
  - type: textarea
    id: pr_requirements
    attributes:
      label: PR requirements
      description: What the eventual PR must include — issue linkage, the facts the summary should state, validation evidence, any deferred items, and parent-resolution notes.
      placeholder: |
        e.g. Closes #41. Summary names the new flag. Paste the test output as evidence. No deferred items.
    validations:
      required: true
