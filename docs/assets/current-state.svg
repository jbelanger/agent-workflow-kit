<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Agent Workflow Kit current state: planning loop is built; execution runs one Ready issue at a time through a runtime worker loop, launched and reviewed manually.">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#9a948b"/></marker>
  </defs>
  <rect x="2" y="2" width="756" height="466" rx="14" fill="#fbfaf8" stroke="#e7e3dc" stroke-width="1.5"/>

  <text x="28" y="38" font-size="18" font-weight="700" fill="#1c1917">Agent Workflow Kit — current state</text>
  <text x="28" y="60" font-size="12" fill="#6b655d">Planning is built. Execution runs one Ready issue at a time through a runtime worker loop.</text>

  <!-- SHAPE -->
  <text x="28" y="98" font-size="12.5" font-weight="700" letter-spacing="0.04em" fill="#1c1917">SHAPE · you + 1 agent</text>
  <g>
    <rect x="28" y="110" width="146" height="52" rx="8" fill="#ffffff" stroke="#dcd8d2"/><rect x="28" y="110" width="6" height="52" rx="3" fill="#2e7d32"/>
    <text x="46" y="134" font-size="13" font-weight="600" fill="#1c1917">Groom</text><text x="46" y="151" font-size="10.5" fill="#6b655d">one question at a time</text>
    <rect x="202" y="110" width="146" height="52" rx="8" fill="#ffffff" stroke="#dcd8d2"/><rect x="202" y="110" width="6" height="52" rx="3" fill="#2e7d32"/>
    <text x="220" y="134" font-size="13" font-weight="600" fill="#1c1917">Spec / ADR</text><text x="220" y="151" font-size="10.5" fill="#6b655d">draft · review</text>
    <rect x="376" y="110" width="146" height="52" rx="8" fill="#ffffff" stroke="#dcd8d2"/><rect x="376" y="110" width="6" height="52" rx="3" fill="#2e7d32"/>
    <text x="394" y="134" font-size="13" font-weight="600" fill="#1c1917">Breakdown</text><text x="394" y="151" font-size="10.5" fill="#6b655d">merge-risk tags</text>
    <rect x="550" y="110" width="146" height="52" rx="8" fill="#ffffff" stroke="#dcd8d2"/><rect x="550" y="110" width="6" height="52" rx="3" fill="#2e7d32"/>
    <text x="568" y="134" font-size="13" font-weight="600" fill="#1c1917">Ready issues</text><text x="568" y="151" font-size="10.5" fill="#6b655d">one-agent tasks</text>
    <line x1="174" y1="136" x2="202" y2="136" stroke="#9a948b" stroke-width="1.5" marker-end="url(#ar)"/>
    <line x1="348" y1="136" x2="376" y2="136" stroke="#9a948b" stroke-width="1.5" marker-end="url(#ar)"/>
    <line x1="522" y1="136" x2="550" y2="136" stroke="#9a948b" stroke-width="1.5" marker-end="url(#ar)"/>
  </g>

  <!-- EXECUTE -->
  <text x="28" y="200" font-size="12.5" font-weight="700" letter-spacing="0.04em" fill="#1c1917">EXECUTE · one worktree at a time</text>
  <rect x="28" y="214" width="402" height="52" rx="8" fill="#ffffff" stroke="#dcd8d2"/><rect x="28" y="214" width="6" height="52" rx="3" fill="#2e7d32"/>
  <text x="46" y="238" font-size="13" font-weight="600" fill="#1c1917">Worktree → implement → make check</text><text x="46" y="255" font-size="10.5" fill="#6b655d">single agent</text>
  <line x1="430" y1="240" x2="458" y2="240" stroke="#9a948b" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="458" y="214" width="120" height="52" rx="8" fill="#ffffff" stroke="#dcd8d2"/><rect x="458" y="214" width="6" height="52" rx="3" fill="#2e7d32"/>
  <text x="476" y="238" font-size="13" font-weight="600" fill="#1c1917">PR</text><text x="476" y="255" font-size="10.5" fill="#6b655d">opened by worker</text>
  <rect x="606" y="214" width="126" height="52" rx="8" fill="#fffaf0" stroke="#b7791f" stroke-dasharray="4 3"/>
  <text x="620" y="238" font-size="12" font-weight="600" fill="#8a5a12">manual launch</text><text x="620" y="255" font-size="10.5" fill="#8a5a12">one at a time</text>

  <!-- REVIEW -->
  <text x="28" y="304" font-size="12.5" font-weight="700" letter-spacing="0.04em" fill="#1c1917">REVIEW &amp; MERGE</text>
  <rect x="28" y="318" width="330" height="52" rx="8" fill="#ffffff" stroke="#dcd8d2"/><rect x="28" y="318" width="6" height="52" rx="3" fill="#b7791f"/>
  <text x="46" y="342" font-size="13" font-weight="600" fill="#1c1917">Reviewer — you start it</text><text x="46" y="359" font-size="10.5" fill="#6b655d">manual kickoff</text>
  <line x1="358" y1="344" x2="388" y2="344" stroke="#9a948b" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="388" y="318" width="344" height="52" rx="8" fill="#ffffff" stroke="#dcd8d2"/><rect x="388" y="318" width="6" height="52" rx="3" fill="#2e7d32"/>
  <text x="406" y="342" font-size="13" font-weight="600" fill="#1c1917">You: approve + squash to main</text><text x="406" y="359" font-size="10.5" fill="#6b655d">agents never merge</text>

  <!-- legend -->
  <text x="28" y="430" font-size="11" fill="#6b655d">Status:</text>
  <rect x="88" y="421" width="11" height="11" rx="2" fill="#2e7d32"/><text x="105" y="430" font-size="11" fill="#6b655d">built</text>
  <rect x="160" y="421" width="11" height="11" rx="2" fill="#b7791f"/><text x="177" y="430" font-size="11" fill="#6b655d">manual today</text>
</svg>
