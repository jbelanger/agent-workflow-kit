name: awk-discover-vision
description: |
  Use after grooming identifies vague product, UX, creative, game, platform, or architecture vision
  work that needs discovery before a spec. The workflow runs the portable discover-vision skill,
  writes a discovery report and optional discovery bundle, then pauses once for vision acceptance
  only when the vision is ready for a spec.

provider: codex
model: gpt-5.5
modelReasoningEffort: high
webSearchMode: disabled
interactive: true
worktree:
  enabled: false

nodes:
  - id: discover
    command: awk-discover-vision
    context: fresh
    output_type: discovery-report

  - id: discovery-status
    depends_on: [discover]
    script: |
      const { existsSync, readFileSync } = await import('node:fs');

      const reportPath = "$ARTIFACTS_DIR/discover-vision.md";

      function section(text, heading) {
        const lines = text.split(/\r?\n/);
        const start = lines.findIndex(line => line.trim() === `## ${heading}`);
        if (start === -1) return '';
        const body = [];
        for (let index = start + 1; index < lines.length; index += 1) {
          if (/^##\s+/.test(lines[index])) break;
          body.push(lines[index]);
        }
        return body.join('\n').trim();
      }

      function field(text, label) {
        const match = text.match(new RegExp(`^${label}:\\s*(.*)$`, 'm'));
        return match?.[1]?.trim() ?? '';
      }

      function emit(status, reason, paths = {}) {
        console.log(JSON.stringify({
          status,
          reason,
          report_path: reportPath,
          ...paths,
        }));
      }

      if (!existsSync(reportPath)) {
        emit('NEEDS_DECISION', 'Discovery report missing at ' + reportPath + '.');
        process.exit(0);
      }

      const text = readFileSync(reportPath, 'utf8');
      const status = section(text, 'Status').split(/\s+/)[0]?.toUpperCase() ?? '';
      const bundle = section(text, 'Discovery bundle');
      const paths = {
        intake_path: field(bundle, 'Intake path'),
        vision_brief_path: field(bundle, 'Vision brief path'),
        decision_log_path: field(bundle, 'Decision log path'),
        research_notes_path: field(bundle, 'Research notes path'),
      };

      const allowed = [
        'READY_FOR_VISION',
        'NEEDS_INTERVIEW',
        'NEEDS_RESEARCH',
        'NEEDS_DECISION',
        'READY_FOR_SPEC',
        'DIRECT_TASK',
        'DROP',
        'DEFER',
      ];

      if (!allowed.includes(status)) {
        emit('NEEDS_DECISION', 'Discovery report has missing or invalid Status.', paths);
        process.exit(0);
      }

      emit(status, 'Discovery reported ' + status + '.', paths);
    runtime: bun

  - id: accept-vision
    depends_on: [discovery-status]
    when: "$discovery-status.output.status == 'READY_FOR_SPEC'"
    approval:
      message: |
        Review the vision brief before drafting a spec.

        Vision brief: $discovery-status.output.vision_brief_path
        Decision log: $discovery-status.output.decision_log_path
        Report: $discovery-status.output.report_path

        Approve only if the vision is accepted as the source for spec drafting. Reject or cancel to
        return to discovery.
      capture_response: true

  - id: record-vision-acceptance
    depends_on: [accept-vision]
    bash: |
      set -euo pipefail
      export APPROVAL_RESPONSE=$accept-vision.output
      node <<'NODE'
      const { existsSync, readFileSync, writeFileSync } = await import('node:fs');

      const reportPath = "$ARTIFACTS_DIR/discover-vision.md";
      const acceptancePath = "$ARTIFACTS_DIR/vision-acceptance.md";
      const approval = process.env.APPROVAL_RESPONSE ?? '';

      function section(text, heading) {
        const lines = text.split(/\r?\n/);
        const start = lines.findIndex(line => line.trim() === `## ${heading}`);
        if (start === -1) return '';
        const body = [];
        for (let index = start + 1; index < lines.length; index += 1) {
          if (/^##\s+/.test(lines[index])) break;
          body.push(lines[index]);
        }
        return body.join('\n').trim();
      }

      function field(text, label) {
        const match = text.match(new RegExp(`^${label}:\\s*(.*)$`, 'm'));
        return match?.[1]?.trim() ?? '';
      }

      function appendDecisionLog(path, entry) {
        if (!path || !existsSync(path)) return false;
        const current = readFileSync(path, 'utf8');
        const marker = '## Human decision history';
        if (!current.includes(marker)) {
          writeFileSync(path, `${current.trimEnd()}\n\n${marker}\n\n${entry}\n`);
          return true;
        }
        writeFileSync(path, `${current.trimEnd()}\n${entry}\n`);
        return true;
      }

      if (!existsSync(reportPath)) {
        throw new Error('Discovery report missing at ' + reportPath);
      }

      const report = readFileSync(reportPath, 'utf8');
      const bundle = section(report, 'Discovery bundle');
      const visionPath = field(bundle, 'Vision brief path');
      const decisionLogPath = field(bundle, 'Decision log path');

      if (!visionPath || !existsSync(visionPath)) {
        throw new Error('Vision brief path missing or not found: ' + visionPath);
      }

      const currentVision = readFileSync(visionPath, 'utf8');
      const acceptedVision = currentVision.includes('Vision state: Draft')
        ? currentVision.replace('Vision state: Draft', 'Vision state: Accepted')
        : currentVision;
      writeFileSync(visionPath, acceptedVision);

      const timestamp = new Date().toISOString();
      const comment = String(approval || '').trim() || '(approved without comment)';
      const entry = `- ${timestamp}: Vision accepted through Archon approval gate. Response: ${comment}`;
      const decisionLogUpdated = appendDecisionLog(decisionLogPath, entry);

      writeFileSync(
        acceptancePath,
        `# Vision Acceptance\n\nStatus: Accepted\n\nVision brief: ${visionPath}\nDecision log: ${decisionLogPath}\nDecision log updated: ${decisionLogUpdated ? 'YES' : 'NO'}\nApproval response: ${comment}\n`
      );

      console.log(JSON.stringify({
        status: 'ACCEPTED',
        vision_brief_path: visionPath,
        decision_log_path: decisionLogPath,
        acceptance_path: acceptancePath,
      }));
      NODE
