name: Direct Task
description: Fast-lane task for tiny, clear work that does not need separate discovery, spec, ADR, spike, breakdown, or re-brief.
title: "[Direct Task] "
labels: ["task", "next:work-issue-local"]
body:
  - type: textarea
    id: awk_state
    attributes:
      label: AWK State
      description: Keep this block current. Mirror the Next workflow verb with exactly one next:* label when labels are available.
      value: |
        <!-- awk-state:start -->
        ## AWK State
        Status: Ready
        Issue Type: Direct Task
        Next workflow verb: work-issue-local
        Owner: Agent
        Merge Risk: Parallel-safe
        Blocked by: None
        Linked PR: None
        Accepted direction: DIRECT_TASK
        Last agent review: None
        Revision cycles: 0
        <!-- awk-state:end -->
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: The small concrete outcome.
    validations:
      required: true
  - type: textarea
    id: direct_task_rationale
    attributes:
      label: DIRECT_TASK rationale
      description: Why no discovery, spec, ADR, spike, breakdown, or human question is needed.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: In scope, out of scope, allowed files/directories, and forbidden files/directories.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true when this tiny task is done?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Exact validation command, or why validation-only/check-only is honest for this tiny task.
    validations:
      required: true
  - type: dropdown
    id: merge_risk
    attributes:
      label: Merge risk
      description: Direct tasks should usually be Parallel-safe. Choose a higher risk only when coordination is real.
      options:
        - Parallel-safe
        - Needs coordination
        - Serial only
    validations:
      required: true
  - type: textarea
    id: pr_requirements
    attributes:
      label: PR requirements
      description: Required issue linkage, summary facts, validation evidence, and any parent-resolution note.
    validations:
      required: true
