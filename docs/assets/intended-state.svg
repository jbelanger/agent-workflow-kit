<svg viewBox="0 0 760 520" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Agent Workflow Kit intended state: same planning loop, but a dispatcher fans work out to parallel worktrees and a reviewer agent auto-picks up PRs; the human still approves and merges.">
  <defs>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#9a948b"/></marker>
  </defs>
  <rect x="2" y="2" width="756" height="516" rx="14" fill="#fbfaf8" stroke="#e7e3dc" stroke-width="1.5"/>

  <text x="28" y="38" font-size="18" font-weight="700" fill="#1c1917">Agent Workflow Kit — intended state</text>
  <text x="28" y="60" font-size="12" fill="#6b655d">Same planning. A dispatcher fans work out to parallel agents; a reviewer auto-picks up PRs.</text>

  <!-- SHAPE -->
  <text x="28" y="98" font-size="12.5" font-weight="700" letter-spacing="0.04em" fill="#1c1917">SHAPE · you + 1 agent (unchanged)</text>
  <g>
    <rect x="28" y="110" width="146" height="52" rx="8" fill="#ffffff" stroke="#dcd8d2"/><rect x="28" y="110" width="6" height="52" rx="3" fill="#2e7d32"/>
    <text x="46" y="134" font-size="13" font-weight="600" fill="#1c1917">Groom</text><text x="46" y="151" font-size="10.5" fill="#6b655d">one question at a time</text>
    <rect x="202" y="110" width="146" height="52" rx="8" fill="#ffffff" stroke="#dcd8d2"/><rect x="202" y="110" width="6" height="52" rx="3" fill="#2e7d32"/>
    <text x="220" y="134" font-size="13" font-weight="600" fill="#1c1917">Spec / ADR</text><text x="220" y="151" font-size="10.5" fill="#6b655d">draft · review</text>
    <rect x="376" y="110" width="146" height="52" rx="8" fill="#ffffff" stroke="#dcd8d2"/><rect x="376" y="110" width="6" height="52" rx="3" fill="#2e7d32"/>
    <text x="394" y="134" font-size="13" font-weight="600" fill="#1c1917">Breakdown</text><text x="394" y="151" font-size="10.5" fill="#6b655d">merge-risk tags</text>
    <rect x="550" y="110" width="146" height="52" rx="8" fill="#ffffff" stroke="#dcd8d2"/><rect x="550" y="110" width="6" height="52" rx="3" fill="#2e7d32"/>
    <text x="568" y="134" font-size="13" font-weight="600" fill="#1c1917">Ready issues</text><text x="568" y="151" font-size="10.5" fill="#6b655d">one-agent tasks</text>
    <line x1="174" y1="136" x2="202" y2="136" stroke="#9a948b" stroke-width="1.5" marker-end="url(#ar2)"/>
    <line x1="348" y1="136" x2="376" y2="136" stroke="#9a948b" stroke-width="1.5" marker-end="url(#ar2)"/>
    <line x1="522" y1="136" x2="550" y2="136" stroke="#9a948b" stroke-width="1.5" marker-end="url(#ar2)"/>
  </g>

  <!-- EXECUTE: fan-out -->
  <text x="28" y="200" font-size="12.5" font-weight="700" letter-spacing="0.04em" fill="#1c1917">EXECUTE · autonomous fan-out</text>
  <rect x="28" y="212" width="158" height="96" rx="8" fill="#ffffff" stroke="#dcd8d2"/><rect x="28" y="212" width="6" height="96" rx="3" fill="#2563eb"/>
  <rect x="120" y="218" width="58" height="16" rx="8" fill="#2563eb"/><text x="149" y="230" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">NEW</text>
  <text x="46" y="244" font-size="13" font-weight="600" fill="#1c1917">Dispatcher</text>
  <text x="46" y="262" font-size="10.5" fill="#6b655d">reads Ready issues</text>
  <text x="46" y="278" font-size="10.5" fill="#6b655d">+ merge-risk</text>
  <text x="46" y="296" font-size="10" font-style="italic" fill="#6b655d">trigger: schedule / label</text>

  <rect x="214" y="212" width="320" height="26" rx="6" fill="#ffffff" stroke="#dcd8d2"/><rect x="214" y="212" width="6" height="26" rx="3" fill="#2e7d32"/>
  <text x="230" y="229" font-size="12" fill="#1c1917">Worktree 1 → make check → PR</text>
  <rect x="214" y="248" width="320" height="26" rx="6" fill="#ffffff" stroke="#dcd8d2"/><rect x="214" y="248" width="6" height="26" rx="3" fill="#2e7d32"/>
  <text x="230" y="265" font-size="12" fill="#1c1917">Worktree 2 → make check → PR</text>
  <rect x="214" y="284" width="320" height="26" rx="6" fill="#ffffff" stroke="#dcd8d2"/><rect x="214" y="284" width="6" height="26" rx="3" fill="#2e7d32"/>
  <text x="230" y="301" font-size="12" fill="#1c1917">Worktree 3 → make check → PR</text>
  <line x1="186" y1="248" x2="214" y2="225" stroke="#9a948b" stroke-width="1.5" marker-end="url(#ar2)"/>
  <line x1="186" y1="260" x2="214" y2="261" stroke="#9a948b" stroke-width="1.5" marker-end="url(#ar2)"/>
  <line x1="186" y1="272" x2="214" y2="297" stroke="#9a948b" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="552" y="265" font-size="10.5" fill="#6b655d">…and so on</text>
  <text x="214" y="328" font-size="10.5" fill="#6b655d">parallel-safe run together · serial runs alone · agents never merge</text>

  <!-- REVIEW -->
  <text x="28" y="366" font-size="12.5" font-weight="700" letter-spacing="0.04em" fill="#1c1917">REVIEW &amp; MERGE</text>
  <rect x="28" y="380" width="330" height="52" rx="8" fill="#ffffff" stroke="#dcd8d2"/><rect x="28" y="380" width="6" height="52" rx="3" fill="#2563eb"/>
  <rect x="262" y="386" width="58" height="16" rx="8" fill="#2563eb"/><text x="291" y="398" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">NEW</text>
  <text x="46" y="406" font-size="13" font-weight="600" fill="#1c1917">Reviewer agent</text><text x="46" y="423" font-size="10.5" fill="#6b655d">auto-picks up open PRs</text>
  <line x1="358" y1="406" x2="388" y2="406" stroke="#9a948b" stroke-width="1.5" marker-end="url(#ar2)"/>
  <rect x="388" y="380" width="344" height="52" rx="8" fill="#ffffff" stroke="#dcd8d2"/><rect x="388" y="380" width="6" height="52" rx="3" fill="#2e7d32"/>
  <text x="406" y="406" font-size="13" font-weight="600" fill="#1c1917">You: approve + squash to main</text><text x="406" y="423" font-size="10.5" fill="#6b655d">human keeps merge authority</text>

  <!-- legend -->
  <text x="28" y="476" font-size="11" fill="#6b655d">Status:</text>
  <rect x="88" y="467" width="11" height="11" rx="2" fill="#2e7d32"/><text x="105" y="476" font-size="11" fill="#6b655d">built / unchanged</text>
  <rect x="206" y="467" width="11" height="11" rx="2" fill="#2563eb"/><text x="223" y="476" font-size="11" fill="#6b655d">new in intended (dispatcher, parallel worktrees, auto-pickup reviewer, trigger)</text>
</svg>
