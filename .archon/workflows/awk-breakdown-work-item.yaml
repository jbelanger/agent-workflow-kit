name: awk-breakdown-work-item
description: |
  Use after grooming, spec, ADR, spike, or direct direction has been accepted and implementation
  work must be split into merge-safe child work items. The workflow runs the portable
  breakdown-issue skill as a read-only Archon adapter and writes a breakdown artifact.

provider: codex
model: gpt-5.5
modelReasoningEffort: high
webSearchMode: disabled
worktree:
  enabled: false

nodes:
  - id: breakdown
    command: awk-breakdown-work-item
    context: fresh
    output_type: breakdown-report
