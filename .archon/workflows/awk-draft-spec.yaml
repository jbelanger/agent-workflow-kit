name: awk-draft-spec
description: |
  Use after grooming recommends a spec, or when accepted direction needs a durable draft spec before
  breakdown. The workflow runs the portable draft-artifact skill as a spec-only Archon adapter and
  may create or update one draft spec under docs/development/specs/.

provider: codex
model: gpt-5.5
modelReasoningEffort: high
webSearchMode: disabled
interactive: true
worktree:
  enabled: false

nodes:
  - id: draft-readiness
    script: |
      const { existsSync, readFileSync } = await import('node:fs');

      const args = process.env.ARGUMENTS ?? '';
      const artifactMatch = args.match(/(?:^|\s)(\.archon\/artifacts\/runs\/[^\s`'"]+\/groom-issue\.md)/);
      const artifactPath = artifactMatch?.[1] ?? '';

      function emit(status, reason, question = '') {
        console.log(JSON.stringify({
          status,
          reason,
          artifact_path: artifactPath,
          question,
        }));
      }

      function section(text, heading) {
        const lines = text.split(/\r?\n/);
        const start = lines.findIndex(line => line.trim() === `## ${heading}`);
        if (start === -1) return '';
        const body = [];
        for (let index = start + 1; index < lines.length; index += 1) {
          if (/^##\s+/.test(lines[index])) break;
          body.push(lines[index]);
        }
        return body.join('\n').trim();
      }

      if (!artifactPath) {
        emit('READY', 'No grooming artifact path was found in the workflow arguments.');
        process.exit(0);
      }

      if (!existsSync(artifactPath)) {
        emit('STOP', `Referenced grooming artifact does not exist: ${artifactPath}`);
        process.exit(0);
      }

      const text = readFileSync(artifactPath, 'utf8');
      const groomingStatus = section(text, 'Grooming status')
        .split(/\s+/)[0]
        ?.replace(/[`.:]/g, '')
        ?.toUpperCase();
      const humanDecision = section(text, 'Human decision needed');
      const clarification = section(text, 'Clarification question');
      const hasClarification = clarification.length > 0 && !/^None\b/i.test(clarification);
      const decisionNeeded = /^YES\b/i.test(humanDecision);
      const blockingStatus = ['NEEDS_INTERVIEW', 'NEEDS_RESEARCH', 'NEEDS_DECISION'].includes(
        groomingStatus
      );

      if (blockingStatus || decisionNeeded || hasClarification) {
        const reasonParts = [];
        if (blockingStatus) reasonParts.push(`grooming status is ${groomingStatus}`);
        if (decisionNeeded) reasonParts.push('human decision is marked YES');
        if (hasClarification) reasonParts.push('clarification question is present');
        emit(
          'NEEDS_ANSWER',
          `Spec drafting needs human input because ${reasonParts.join(', ')}.`,
          clarification || humanDecision
        );
        process.exit(0);
      }

      emit('READY', 'Grooming artifact has no unresolved human decision or clarification question.');
    runtime: bun

  - id: answer-clarification
    depends_on: [draft-readiness]
    when: "$draft-readiness.output.status == 'NEEDS_ANSWER'"
    approval:
      message: |
        Spec drafting found an unresolved grooming decision.

        Artifact: $draft-readiness.output.artifact_path
        Reason: $draft-readiness.output.reason

        Question or decision:
        $draft-readiness.output.question

        Approve with the answer to use in the draft, or reject/cancel to return to grooming.
      capture_response: true

  - id: stop-draft
    depends_on: [draft-readiness]
    when: "$draft-readiness.output.status == 'STOP'"
    cancel: "Spec drafting stopped: $draft-readiness.output.reason"

  - id: draft-spec
    depends_on: [draft-readiness, answer-clarification, stop-draft]
    trigger_rule: none_failed_min_one_success
    when: "$draft-readiness.output.status == 'READY' || $draft-readiness.output.status == 'NEEDS_ANSWER'"
    command: awk-draft-spec
    context: fresh
    output_type: draft-spec-report
