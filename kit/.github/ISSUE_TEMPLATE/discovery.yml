name: Discovery
description: Clarify product, UX, creative, platform, or architecture direction before drafting durable artifacts.
title: "[Discovery] "
labels: ["discovery", "next:discover-vision"]
body:
  - type: markdown
    attributes:
      value: |
        **Still figuring out the direction?** Use this to work through an open product, UX, or technical question before committing to a spec or ADR. The **AWK State** block at the top is agent housekeeping — leave it as-is.
  - type: textarea
    id: awk_state
    attributes:
      label: AWK State
      description: Housekeeping your agent maintains — you can leave the defaults. (The agent keeps the Next workflow verb in sync with one next:* label.)
      value: |
        <!-- awk-state:start -->
        ## AWK State
        Status: Discovery
        Issue Type: Discovery
        Next workflow verb: discover-vision
        Owner: Agent
        Merge Risk: Unknown
        Blocked by: None
        Linked PR: None
        Accepted direction: None
        Last agent review: None
        Revision cycles: 0
        <!-- awk-state:end -->
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source
      description: Where this came from — link the originating idea, issue, prompt, note, or imported plan.
      placeholder: |
        e.g. Sparked by the activation goal in initiative #12.
    validations:
      required: true
  - type: textarea
    id: unresolved_direction
    attributes:
      label: Unresolved direction
      description: The product, UX, creative, platform, architecture, or validation choice that's still too vague to build.
      placeholder: |
        e.g. We know we want "guided onboarding" but not what the steps are or how much to automate.
    validations:
      required: true
  - type: textarea
    id: audience_and_context
    attributes:
      label: Audience and context
      description: Who it's for and the constraints around it — target user, workflow, market/genre expectations, platform limits, domain context known so far.
      placeholder: |
        e.g. Solo developers trying the tool for the first time; mostly on the web app, some on mobile.
    validations:
      required: false
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and non-goals
      description: What discovery must respect, and what it should deliberately not decide.
      placeholder: |
        e.g. Must work without an email step. Don't decide the final visual design here.
    validations:
      required: true
  - type: textarea
    id: lenses
    attributes:
      label: Discovery lenses
      description: Which angles to explore before a useful artifact can exist — product, UX, creative, technical, validation, research, or others.
      placeholder: |
        e.g. Product (what's the day-one win?) and UX (how many steps?). Light technical check on what's automatable.
    validations:
      required: true
  - type: textarea
    id: first_question
    attributes:
      label: First human question
      description: The single highest-leverage question for discover-vision to ask first — or why research should happen before any question.
      placeholder: |
        e.g. "What's the one thing a new user must succeed at on day one?"
    validations:
      required: false
