name: awk-review-local-changes
description: |
  Use for a read-only local diff review before pushing or opening a PR.
  The workflow challenges architecture direction first, then reports blockers, test gaps,
  scope drift, and review-triage classification. It does not edit files.

provider: codex
model: gpt-5.5
modelReasoningEffort: high
webSearchMode: disabled
worktree:
  enabled: false

nodes:
  - id: review
    command: awk-review-local-changes
    context: fresh
    output_type: local-review
