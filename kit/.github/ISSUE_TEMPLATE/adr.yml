name: ADR
description: Record a durable architecture, storage, ownership, public-surface, or policy decision.
title: "[ADR] "
labels: ["adr", "next:draft-artifact"]
body:
  - type: markdown
    attributes:
      value: |
        **Record a decision you'll want to remember the reasoning for later** — architecture, storage, ownership, a public surface, or a policy. Lay out the options and your recommendation. Agents use labels, comments, and the rebuildable workflow cache for routing state.
  - type: textarea
    id: decision
    attributes:
      label: Decision to make
      description: The architecture, ownership, storage, boundary, public-surface, or policy choice on the table.
      placeholder: |
        e.g. Where do we store uploaded files — in Postgres, on S3, or on local disk?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context and source evidence
      description: Why this decision is needed now — link the issue, plan, code, incident, spec, spike, or prior decision that forces it.
      placeholder: |
        e.g. Upload volume is growing and the DB is the bottleneck (see incident #74). Triggered by spec #42.
    validations:
      required: true
  - type: textarea
    id: options
    attributes:
      label: Options considered
      description: The credible options, and the tradeoff each one creates.
      placeholder: |
        e.g.
        - S3: durable and cheap, but adds an external dependency
        - Postgres bytea: simple, but bloats the database
        - Local disk: easy in dev, doesn't scale across instances
    validations:
      required: true
  - type: textarea
    id: recommendation
    attributes:
      label: Recommended direction
      description: Which option should become durable truth, and why.
      placeholder: |
        e.g. S3 — durability and cost outweigh the added dependency, and it's the only option that scales horizontally.
    validations:
      required: true
  - type: textarea
    id: review_path
    attributes:
      label: Review and next step
      description: What happens after this — drafting, artifact review, a human decision, breakdown, or implementation.
      placeholder: |
        e.g. Needs a human decision on the dependency, then breakdown into the storage-layer task.
    validations:
      required: true
