name: awk-groom-issue
description: |
  Use when an issue, idea, tracker item, or spike candidate is not ready for implementation.
  The workflow runs the portable groom-issue skill as a read-only Archon adapter and writes
  a grooming artifact. It does not edit code or update GitHub.

provider: codex
model: gpt-5.5
modelReasoningEffort: high
webSearchMode: disabled
worktree:
  enabled: false

nodes:
  - id: groom
    command: awk-groom-issue
    context: fresh
    output_type: grooming-report
