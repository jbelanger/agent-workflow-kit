name: Spec
description: Define behavior, contracts, records, APIs, or user-visible semantics before implementation.
title: "[Spec] "
labels: ["spec", "next:draft-artifact"]
body:
  - type: textarea
    id: awk_state
    attributes:
      label: AWK State
      description: Keep this block current. Mirror the Next workflow verb with exactly one next:* label when labels are available.
      value: |
        <!-- awk-state:start -->
        ## AWK State
        Status: Drafting
        Issue Type: Spec
        Next workflow verb: draft-artifact
        Owner: Agent
        Merge Risk: Unknown
        Blocked by: None
        Linked PR: None
        Accepted direction: None
        Last agent review: None
        Revision cycles: 0
        <!-- awk-state:end -->
    validations:
      required: true
  - type: dropdown
    id: spec_state
    attributes:
      label: Spec state
      options:
        - Draft
        - Accepted
        - Implemented
        - Superseded
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operational problem does this spec solve?
    validations:
      required: true
  - type: textarea
    id: source_context
    attributes:
      label: Source context
      description: Link grooming, discovery, ADRs, incidents, product notes, code, or prior specs that define the work.
    validations:
      required: true
  - type: textarea
    id: proposed_behavior
    attributes:
      label: Proposed behavior or contract
      description: What should become accepted truth after review?
    validations:
      required: true
  - type: textarea
    id: open_questions
    attributes:
      label: Open questions or decisions
      description: Record unresolved behavior, product, architecture, ownership, validation, or UX questions. Use None only when honest.
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What should this spec not settle?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance and breakdown notes
      description: What makes this spec accepted, and what implementation slices should follow after acceptance?
    validations:
      required: false
