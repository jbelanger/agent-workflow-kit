assistant: codex

assistants:
  codex:
    model: gpt-5.5
    modelReasoningEffort: high
    codexBinaryPath: /Applications/Codex.app/Contents/Resources/codex
    webSearchMode: disabled

defaults:
  loadDefaultCommands: false
  loadDefaultWorkflows: false

worktree:
  baseBranch: main

recommendedWorkflows:
  - awk-continue-work
  - awk-groom-issue
  - awk-discover-vision
  - awk-draft-spec
  - awk-breakdown-work-item
  - awk-prepare-implementation
  - awk-work-issue-local
  - awk-review-local-changes
  - awk-validate-process-pack
